name: Test

on:
  push:
    branches:
      - '**'

jobs:
  backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci
      - run: npm run test

  webui:
    name: Webui unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: webui/package-lock.json

      - run: npm ci
        working-directory: webui
      - run: npm test -- --watchAll=false
        working-directory: webui

  deploy:
    name: Deploy (mock)
    needs: [backend, webui]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend
        run: echo "Building NestJS backend..." && sleep 1 && echo "Build complete."

      - name: Build webui
        run: echo "Building React webui..." && sleep 1 && echo "Build complete."

      - name: Deploy to production (mock)
        run: |
          echo "All tests passed on master — deploying..."
          echo "Pushing backend image to registry (mock)"
          sleep 1
          echo "Pushing webui build to hosting (mock)"
          sleep 1
          echo "Deployment finished successfully."
